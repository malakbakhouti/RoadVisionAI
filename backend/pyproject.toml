[project]
name = "roadvisionai-backend"
version = "0.1.0"
description = "RoadVisionAI — AI-powered road inspection & predictive maintenance platform (DGR Maroc)"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.35",
    "sqlalchemy[asyncio]>=2.0,<3.0",
    "sqlparse>=0.5",
    "asyncpg>=0.30",
    "geoalchemy2>=0.16",
    "alembic>=1.16",
    "pydantic[email]>=2.11",
    "pydantic-settings>=2.7",
    "pyjwt>=2.10",
    "passlib>=1.7",
    "argon2-cffi>=23.1",
    "structlog>=25.1",
    "minio>=7.2",
    "python-multipart>=0.0.20",
    "pillow>=11.0",
    "reportlab>=4.2",
    "ultralytics>=8.4",
    "torch>=2.6",
    "torchvision>=0.21",
    "opencv-python-headless>=4.10",
    "chromadb>=1.0",
    "pymupdf>=1.25",
    "sentence-transformers>=3.3",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "httpx>=0.28",
    "ruff>=0.9",
    "pre-commit>=4.0",
    "testcontainers[postgres]>=4.9",
]

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "ASYNC"]

[tool.ruff.lint.per-file-ignores]
# Generated from schema v4.2: long CheckConstraint SQL strings are verbatim DDL
"app/db/models/*" = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv]
package = false
# ultralytics declares opencv-python (GUI variant needing X11 system libs);
# the impossible marker nullifies it and opencv-python-headless (same cv2
# API, zero system deps) is provided as a direct dependency instead.
override-dependencies = [
    "opencv-python; sys_platform == 'never'",
    # torch 2.13 declare des roues CUDA meme sur ARM64 Linux (support Grace) :
    # ~2,5 Go de paquets inutiles en dev Mac comme en production CPU DGR.
    "cuda-bindings; sys_platform == 'never'",
    "cuda-toolkit; sys_platform == 'never'",
    "nvidia-cudnn-cu13; sys_platform == 'never'",
    "nvidia-cusparselt-cu13; sys_platform == 'never'",
    "nvidia-nccl-cu13; sys_platform == 'never'",
    "nvidia-nvshmem-cu13; sys_platform == 'never'",
    "triton; sys_platform == 'never'",
]

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
