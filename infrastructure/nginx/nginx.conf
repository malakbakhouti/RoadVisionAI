# RoadVisionAI — reverse proxy (TechStack §7)
# Serves /api -> backend; SPA static files join in Week 6.
upstream backend { server backend:8000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;   # road image uploads (APISpec §7)

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # async 202 pattern: requests stay short anyway
    }

    location /docs    { proxy_pass http://backend; }
    location /openapi.json { proxy_pass http://backend; }
}
